plugins {
    id "com.android.application"
    id "com.google.gms.google-services" // Google Services plugin
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin" // Flutter plugin (must be last)
}

android {
    namespace "com.zerobee.pillscheduler"
    compileSdkVersion 35
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true // Required for Java 8+ features on older devices
    }

    kotlinOptions {
        jvmTarget = "17" // Must match JavaVersion above
    }

    defaultConfig {
        applicationId "com.zerobee.pillscheduler"
        minSdk 31
        targetSdk 33
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled true // Add this if using many dependencies
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug // Replace with your release keystore later
            // Enable code shrinking and obfuscation
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source "../.."
}
ext.kotlin_version = '1.9.23'

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"

    implementation platform('com.google.firebase:firebase-bom:33.12.0')
    implementation 'com.google.firebase:firebase-analytics' // Add Firebase modules you use
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
}
